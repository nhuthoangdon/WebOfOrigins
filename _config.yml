# Site Settings
title: Web of Origins
description: Visualising the connections between products, materials, industries, origins, and impacts.
author: Web of Origins
url: https://weboforigins.com
baseurl: ""
logo: /src/Assets/logo.svg

# Build Settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Includes & Excludes
include:
  - _pages
  - blog
  - insights
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-archives
  - jekyll-tagging

# Defaults
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Excerpt
excerpt_separator: <!--more-->

# Minima Theme (optional overrides)
theme: minima
minima:
  skin: auto
  social_links:
    twitter: WebOfOrigins
    linkedin: company/weboforigins
    facebook: WebOfOrigins


collections:
  posts:
    output: true
    permalink: /insights/:categories/:title:output_ext


tagging:
  enabled: true
  layout: post
  permalink: /taglist/:name/
  dir: tags
  permalink_style: pretty