<!DOCTYPE html>
<html lang="en">

{% include head.html %}

<body class="ai-mode">

    <div class="ai-fullscreen">

        <!-- minimal top bar with back button -->
        <div class="ai-header-bar">
            <a href="/" class="back-to-main">
                <i class="fa-solid fa-arrow-left-long"></i>
                Back to Main Site
            </a>

            <img src="/src/Assets/logomark.svg" alt="Web of Origins Logo" />

            <div class="ai-mode-label">
                <i class="fa-solid fa-brain"></i>
                <span>Web of Origins AI</span>
            </div>
        </div>

        <!-- main content area -->
        <main class="ai-main">
            <div class="ai-loading" id="ai-loading">
                <div>Loading AI assistant…</div>
            </div>

            <iframe id="ai-frame" src="https://web-of-origins-ai.vercel.app/"
                title="AI-assisted search – Web of Origins" allow="clipboard-write" loading="lazy">
            </iframe>
        </main>

    </div>

    <script>
        const loading = document.getElementById('ai-loading');
        const frame = document.getElementById('ai-frame');

        frame.onload = () => {
            loading?.classList.add('hidden');
            setTimeout(() => loading?.remove(), 600);
        };

        // safety fallback
        setTimeout(() => loading?.classList.add('hidden'), 15000);
    </script>

</body>
</html>
