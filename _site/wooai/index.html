<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/dist/dist/vis-network.min.css" type="text/css" />
    <link rel="stylesheet" href="/assets/main.css?v1.2.4" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    
    <title>AI Mode - by Web of Origins</title>
    
    <link rel="icon" type="image/x-icon" href="/src/Assets/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/src/Assets/favicon_light.svg" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/svg+xml" href="/src/Assets/favicon_dark.svg" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" href="/src/Assets/favicon_default.png">

    <script data-search-pseudo-elements src="https://kit.fontawesome.com/22d2e141d4.js" crossorigin="anonymous"></script>

    <link rel="preconnect" href="https://challenges.cloudflare.com">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body class="ai-mode">

    <div class="ai-fullscreen">

        <!-- minimal top bar with back button -->
        <div class="ai-header-bar">
            <a href="/" class="back-to-main">
                <i class="fa-solid fa-arrow-left-long"></i>
                Back to Main Site
            </a>

            <img src="/src/Assets/logomark.svg" alt="Web of Origins Logo" />

            <div class="ai-mode-label">
                <i class="fa-solid fa-brain"></i>
                <span>Web of Origins AI</span>
            </div>
        </div>

        <!-- main content area -->
        <main class="ai-main">
            <div class="ai-loading" id="ai-loading">
                <div>Loading AI features…</div>
            </div>

            <iframe id="ai-frame" src="https://web-of-origins-ai.vercel.app/"
                title="AI-assisted search – Web of Origins" allow="clipboard-write" loading="lazy">
            </iframe>
        </main>

    </div>

    <script>
        const loading = document.getElementById('ai-loading');
        const frame = document.getElementById('ai-frame');

        let loaded = false;

        const hideLoader = () => {
            if (!loading || loaded) return;
            loaded = true;

            loading.style.transition = 'opacity 0.5s ease';
            loading.style.opacity = '0';

            setTimeout(() => {
                loading.remove();
            }, 550);
        };

        // Hide as soon as iframe starts loading content
        frame.addEventListener('load', hideLoader);

        // Aggressive early hide if it's taking too long
        setTimeout(hideLoader, 6000);

        // Final safety net
        setTimeout(hideLoader, 12000);
    </script>

    <script src="https://code.jquery.com/jquery-3.7.1.slim.min.js"
    integrity="sha256-kmHvs0B+OpCW5GVHUNjv9rOmY0IvSIRcf7zGUDTDQM8=" crossorigin="anonymous"></script>
    <script src="/src/script.js?v1.1.0" type="text/javascript"></script>
</body>
</html>
